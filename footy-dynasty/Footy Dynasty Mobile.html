<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Footy Dynasty — Mobile · Direction A</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="tokens.css" />
  <style>
    html, body { height: 100%; }
    body { background: #f0eee9; font-family: "Inter", system-ui, sans-serif; color: #2a251f; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script src="data.js"></script>
  <script type="text/babel" src="experiments/design-canvas.jsx"></script>
  <script type="text/babel" src="experiments/ios-frame.jsx"></script>
  <script type="text/babel" src="experiments/primitives.jsx"></script>
  <script type="text/babel" src="experiments/direction-a-mobile.jsx"></script>

  <script type="text/babel">
    const { DesignCanvas, DCSection, DCArtboard, IOSDevice } = window;

    function App() {
      const { MobileHub, MobileSquad, MobileMatch, MobileClub, MobileRecruit, MobileCompete } = window.FDA_MOBILE;

      const W = 393, H = 852; // iPhone 16 Pro

      const wrap = (Cmp) => (
        <IOSDevice variant="dynamic-island" width={W} height={H}>
          <Cmp />
        </IOSDevice>
      );

      const screens = [
        { id: "hub",     title: "01 · Hub",         A: MobileHub },
        { id: "squad",   title: "02 · Squad",       A: MobileSquad },
        { id: "match",   title: "03 · Match Day",   A: MobileMatch },
        { id: "club",    title: "04 · Club",        A: MobileClub },
        { id: "recruit", title: "05 · Recruit",     A: MobileRecruit },
        { id: "compete", title: "06 · Competition", A: MobileCompete },
      ];

      return (
        <DesignCanvas>
          <DCSection id="intro" title="Footy Dynasty — Mobile · Direction A" subtitle="iOS 16 · 393×852 · 6 screens · same dark broadcast aesthetic, native bottom tab bar.">
            <DCArtboard id="brief" label="Brief" width={420} height={500}>
              <div className="dirA" style={{ width: "100%", height: "100%", padding: 32, display: "flex", flexDirection: "column", gap: 14 }}>
                <div className="row aic gap-2">
                  <div style={{ width: 24, height: 24, background: "var(--A-accent)", clipPath: "polygon(0 0, 100% 0, 100% 70%, 70% 100%, 0 100%)" }} />
                  <div className="display" style={{ fontSize: 18, letterSpacing: "0.04em" }}>DYNASTY · MOBILE</div>
                </div>
                <div className="display glow-text" style={{ fontSize: 38, lineHeight: 0.9 }}>POCKET<br/>BROADCAST</div>
                <hr/>
                <div className="label">DESIGN NOTES</div>
                <div className="col gap-2" style={{ fontSize: 12, color: "var(--A-text-dim)" }}>
                  <div>▸ Same color tokens, type and panel system as desktop</div>
                  <div>▸ 5-tab bottom nav · Hub · Squad · Match · Club · More</div>
                  <div>▸ Hero card per screen — momentum, narrative, cash, captain</div>
                  <div>▸ Stat strip + scrollable detail below</div>
                  <div>▸ Filter chips on Squad, swipeable</div>
                  <div>▸ Live match: oversized counting score, momentum bar, feed</div>
                </div>
                <div style={{ flex: 1 }} />
                <a href="Footy Dynasty Redesign.html" style={{ fontFamily: "JetBrains Mono", fontSize: 11, color: "var(--A-accent)", letterSpacing: "0.18em", textTransform: "uppercase", textDecoration: "none", border: "1px solid var(--A-line-2)", padding: "10px 12px", borderRadius: 4, textAlign: "center" }}>← BACK TO DESKTOP</a>
              </div>
            </DCArtboard>
          </DCSection>

          <DCSection id="phones" title="Mobile screens" subtitle="iPhone 16 Pro · drag to rearrange · click ⛶ to focus.">
            {screens.map(s => (
              <DCArtboard key={s.id} id={s.id} label={s.title} width={W + 40} height={H + 40}>
                <div style={{ width: "100%", height: "100%", display: "flex", alignItems: "center", justifyContent: "center", background: "transparent", padding: 20 }}>
                  {wrap(s.A)}
                </div>
              </DCArtboard>
            ))}
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
