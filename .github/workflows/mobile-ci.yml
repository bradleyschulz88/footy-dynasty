# Keeps the Expo/React Native app's bundle green. Runs when the mobile app or the
# shared engine source changes. `npm run export` runs the engine sync first (its
# preexport hook), so this also verifies the web app's src still bundles under RN.
name: mobile-ci

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - "footy-dynasty/src/**"
      - ".github/workflows/mobile-ci.yml"
  pull_request:
    paths:
      - "mobile/**"
      - "footy-dynasty/src/**"
      - ".github/workflows/mobile-ci.yml"

jobs:
  bundle:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - name: Bundle (native) — also runs the engine sync
        run: npm run export -- --platform ios --output-dir /tmp/mobile-bundle
