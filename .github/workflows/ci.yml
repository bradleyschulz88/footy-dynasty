name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: footy-dynasty

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: footy-dynasty/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - run: npm run build

      - run: npx playwright install --with-deps

      - run: npm run test:e2e
